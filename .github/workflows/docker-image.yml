# Tên workflow hiển thị trên GitHub Actions
name: Docker Image CI

# Khi nào workflow được chạy
on:
  # Khi push code lên branch main
  push:
    branches: [ "main" ]
  # Khi tạo pull request vào main
  pull_request:
    branches: [ "main" ]

# Danh sách các job
jobs:
  # Job build
  build:
    # Chạy trên máy ảo Ubuntu của GitHub
    runs-on: ubuntu-latest

    # Các bước thực hiện trong job
    steps:

      # Bước 1: Checkout code từ repo về máy ảo
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'   # bản OpenJDK phổ biến
          java-version: '17'

      # Bước 3: Build project và chạy test (JUnit)
      - name: Run tests with Maven
        run: ./mvnw test

      # Bước 4: Build Docker image
      - name: Build Docker image
        run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
